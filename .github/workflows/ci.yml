name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test
        env:
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_ANON_KEY: test-key
          NEXT_PUBLIC_ONCHAINKIT_API_KEY: test-key
          NEXT_PUBLIC_BASE_NETWORK: testnet

      - name: Build
        run: npm run build
        env:
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_ANON_KEY: test-key
          NEXT_PUBLIC_ONCHAINKIT_API_KEY: test-key
          NEXT_PUBLIC_BASE_NETWORK: testnet
